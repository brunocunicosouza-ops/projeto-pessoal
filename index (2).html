<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MusicApp</title>
    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🎵 MusicApp</h2>

        <div class="menu">
            <div class="item active">
                <i class="fas fa-home"></i> Início
            </div>
            <div class="item">
                <i class="fas fa-star"></i> Favoritos
            </div>
            <div class="item">
                <i class="fas fa-cog"></i> Configurações
            </div>
        </div>
    </aside>

    <!-- Conteúdo -->
    <main class="content">

        <!-- Topo -->
        <div class="top-bar">
            <input type="text" placeholder="Buscar músicas...">
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <h1>Boa noite</h1>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <img src="https://picsum.photos/200?1">
                <p>Playlist 1</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?2">
                <p>Playlist 2</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?3">
                <p>Playlist 3</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?4">
                <p>Playlist 4</p>
            </div>
        </div>

    </main>

</div>

</body>
</html>
